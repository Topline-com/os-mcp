name = "topline-os-mcp"
main = "src/remote.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
account_id = "9013139d3c5200efb4c73c5ecb36d8be"

# Custom domain binding. Cloudflare auto-provisions TLS. Requires
# topline.com to be a zone in the account_id above.
routes = [
  { pattern = "os-mcp.topline.com", custom_domain = true }
]

# Brand name baked into this deployment. Override per-env with `[env.<name>.vars]`
# if you're reselling under a different label.
[vars]
TOPLINE_BRAND_NAME = "Topline OS"

# TOKEN_SIGNING_SECRET is set out-of-band — NEVER commit it:
#   wrangler secret put TOKEN_SIGNING_SECRET
# Generate with: openssl rand -hex 32

# ConnectionDirectory — encrypted customer connections (key: connection_id).
# PITs are encrypted at rest with a key derived from TOKEN_SIGNING_SECRET
# via HKDF; see packages/shared-auth/src/encryption.ts.
[[kv_namespaces]]
binding = "CONNECTIONS"
id = "f88571c17a4c47d4bf0a174d4c7dcb53"

# LocationDO — per-tenant Durable Object backed by SQLite. Owns the synced
# data warehouse for one location_id. Class ships from packages/shared-do
# and is re-exported by apps/edge/src/remote.ts so wrangler can bind it.
[[durable_objects.bindings]]
name = "LOCATION_DO"
class_name = "LocationDO"

# Service binding to the sync worker. Used for fire-and-forget kickoff
# calls when a new connection is created: the edge handler calls
# env.SYNC_WORKER.fetch(...) via ctx.waitUntil so the customer's initial
# backfill starts immediately rather than waiting up to 15 min for the
# next cron tick. Authorized with the same ADMIN_TOKEN the sync worker
# already checks — service bindings aren't a trust boundary on their own.
[[services]]
binding = "SYNC_WORKER"
service = "topline-os-sync"

# DO class registration. `new_sqlite_classes` enables the SQLite storage
# backend (required for LocationDO to use ctx.storage.sql). Migrations are
# append-only; never remove or renumber existing entries.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["LocationDO"]

[observability]
enabled = true
